server:
  port: 8083

spring:
  # JAVA 21 VIRTUAL THREADS (Active for all high-load stock deduction tasks)
  threads:
    virtual:
      enabled: true

  # DATABASE (PostgreSQL - Mandatory Page 6)
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:5432/${DB_NAME:inventorydb}
    username: ${DB_USER:shopscale}
    password: ${DB_PASS:shopscale}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # KAFKA (Consumer & SAGA Producer Support)
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}

    consumer:
      group-id: inventory-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.use.type.headers: false
        # FIX: Was com.shopscale.contracts.events — actual package is com.shopscale.common.events
        spring.json.value.default.type: com.shopscale.common.events.OrderPlacedEvent

    # SAGA PRODUCER (Mandatory for reporting failures)
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 5
      properties:
        enable.idempotence: true

# OBSERVABILITY & HEALTH (Week 4 Trace/Metrics Mandate)
management:
  endpoints:
    web:
      exposure:
        include: "health,info,metrics,prometheus"
  endpoint:
    health:
      show-details: always
    info:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  # DISTRIBUTED TRACING
  tracing:
    sampling:
      probability: 1.0

# STRUCTURED LOGGING & TRACING
logging:
  pattern:
    level: "%5p [${spring.application.name},%X{traceId:-},%X{spanId:-}]"
  level:
    com.shopscale.inventory: INFO

# SERVICE DISCOVERY
eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:discovery-service}:8761/eureka/
  instance:
    prefer-ip-address: true