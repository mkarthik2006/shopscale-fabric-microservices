server:
  port: 8083

spring:
  # JAVA 21 VIRTUAL THREADS
  threads:
    virtual:
      enabled: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://${KEYCLOAK_HOST:keycloak}:${KEYCLOAK_PORT:8080}/realms/shopscale

  redis:
    redisson:
      config: |
        singleServerConfig:
          address: "redis://${REDIS_HOST}:${REDIS_PORT}"

  # DATABASE (PostgreSQL)
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:5432/${DB_NAME:inventorydb}
    username: ${DB_USER:shopscale}
    password: ${DB_PASS:shopscale}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        cache:
          use_second_level_cache: true
          use_query_cache: false
          region:
            factory_class: org.redisson.hibernate.RedissonRegionFactory
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  # KAFKA (Consumer & SAGA Producer Support)
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}

    listener:
      missing-topics-fatal: false

    consumer:
      group-id: inventory-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.shopscale.common.events,java.lang,java.util"
        spring.json.use.type.headers: false
        # FIX: Was com.shopscale.contracts.events — must be com.shopscale.common.events
        spring.json.value.default.type: com.shopscale.common.events.OrderPlacedEvent

    # SAGA PRODUCER
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 5
      properties:
        enable.idempotence: true

# OBSERVABILITY & HEALTH
management:
  endpoints:
    web:
      exposure:
        include: "health,info,metrics,prometheus"
  endpoint:
    health:
      show-details: always
    info:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  # DISTRIBUTED TRACING
  tracing:
    sampling:
      probability: 1.0

# STRUCTURED LOGGING & TRACING
logging:
  pattern:
    level: '{ "traceId": "%X{traceId:-}", "spanId": "%X{spanId:-}" } %5p [%t] %c{1}: %m%n'
  level:
    com.shopscale.inventory: INFO

# SERVICE DISCOVERY
eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:discovery-service}:8761/eureka/
  instance:
    prefer-ip-address: true