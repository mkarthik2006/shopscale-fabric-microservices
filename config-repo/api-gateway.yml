server:
  port: 8080

spring:
  # JAVA 21 VIRTUAL THREADS
  threads:
    virtual:
      enabled: true

  cloud:
    gateway:
      discovery:
        locator:
          enabled: false
      
      httpclient:
        connect-timeout: 3000
        response-timeout: 5000

      routes:
        # BFF: browser hits /auth/** on the gateway; StripPrefix forwards /realms/... to Keycloak
        - id: keycloak-bff
          uri: http://${KEYCLOAK_HOST:keycloak}:${KEYCLOAK_PORT:8080}
          predicates:
            - Path=/auth/**
          filters:
            - StripPrefix=1

        - id: product-service
          uri: lb://product-service
          predicates:
            - Path=/api/products/**
          filters:
            - name: CircuitBreaker
              args:
                name: productService
            - TokenRelay

        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/orders/**
          filters:
            - name: CircuitBreaker
              args:
                name: orderService
            - TokenRelay

        - id: inventory-service
          uri: lb://inventory-service
          predicates:
            - Path=/api/inventory/**
          filters:
            - name: CircuitBreaker
              args:
                name: inventoryService
            - TokenRelay
        
        - id: cart-service
          uri: lb://cart-service
          predicates:
            - Path=/api/cart/**
          filters:
            - name: CircuitBreaker
              args:
                name: cartService
            - TokenRelay

        - id: price-service
          uri: lb://price-service
          predicates:
            - Path=/api/prices/**
          filters:
            - name: CircuitBreaker
              args:
                name: priceService
            - TokenRelay

  security:
    oauth2:
      resourceserver:
        jwt:
          # CLEAN CODE: Port externalized via env var
          issuer-uri: http://${KEYCLOAK_HOST:keycloak}:${KEYCLOAK_PORT:8080}/realms/shopscale

  # CLEAN CODE: Spring Boot 3.x prefix
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}

  # PROJECT_RULES.md §1 — Redis-backed WebSession (edge session management)
  session:
    store-type: redis
    redis:
      namespace: spring:session:gateway

# SERVICE DISCOVERY
eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:discovery-service}:8761/eureka/

# OBSERVABILITY & TRACING
management:
  endpoints:
    web:
      exposure:
        include: "health,info,metrics,prometheus" 
  tracing:
    sampling:
      probability: 1.0
  metrics:
    tags:
      application: ${spring.application.name}

# STRUCTURED LOGGING
logging:
  pattern:
    level: '{ "traceId": "%X{traceId:-}", "spanId": "%X{spanId:-}" } %5p [%t] %c{1}: %m%n'

app:
  rate-limit:
    # Comma-separated remote proxy IPs allowed to supply X-Forwarded-For.
    trusted-proxies: ${TRUSTED_PROXY_IPS:}