server:
  port: 8082

spring:
  #JAVA 21 VIRTUAL THREADS (Enable for high-load transaction handling)
  threads:
    virtual:
      enabled: true

  #DATABASE (PostgreSQL - Mandatory Page 6)
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:5432/${DB_NAME:orderdb}
    username: ${DB_USER:shopscale}
    password: ${DB_PASS:shopscale}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  #KAFKA (Producer & Event-Driven Settings)
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      #ENTERPRISE DURABILITY (Page 6 Mandate)
      acks: all 
      retries: 5
      properties:
        enable.idempotence: true # Prevents duplicate "Order Placed" events
        spring.json.add.type.headers: false # Don't send internal DTO class names

#OBSERVABILITY & HEALTH (Week 4 Trace/Metrics Mandate)
management:
  endpoints:
    web:
      exposure:
        include: "health,info,metrics,prometheus" 
  endpoint:
    health:
      show-details: always
    info:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  #DISTRIBUTED TRACING (100% Trace Sampling for production observability)
  tracing:
    sampling:
      probability: 1.0

#STRUCTURED LOGGING & TRACING
logging:
  pattern:
    level: "%5p [${spring.application.name},%X{traceId:-},%X{spanId:-}]"
  level:
    com.shopscale.order: INFO

#SERVICE DISCOVERY
eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:discovery-service}:8761/eureka/
  instance:
    prefer-ip-address: true
