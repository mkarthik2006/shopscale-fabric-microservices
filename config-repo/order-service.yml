server:
  port: 8082

spring:
  #JAVA 21 VIRTUAL THREADS (Enable for high-load transaction handling)
  threads:
    virtual:
      enabled: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://${KEYCLOAK_HOST:keycloak}:${KEYCLOAK_PORT:8080}/realms/shopscale

  redis:
    redisson:
      config: |
        singleServerConfig:
          address: "redis://${REDIS_HOST}:${REDIS_PORT}"

  #DATABASE (PostgreSQL - Mandatory Page 6)
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:5432/${DB_NAME:orderdb}
    username: ${DB_USER:shopscale}
    password: ${DB_PASS:shopscale}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        cache:
          use_second_level_cache: true
          use_query_cache: false
          region:
            factory_class: org.redisson.hibernate.RedissonRegionFactory
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  #KAFKA (Producer & Event-Driven Settings)
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}

    listener:
      missing-topics-fatal: false

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      #ENTERPRISE DURABILITY (Page 6 Mandate)
      acks: all 
      retries: 5
      properties:
        enable.idempotence: true # Prevents duplicate "Order Placed" events
        spring.json.add.type.headers: true

#OBSERVABILITY & HEALTH (Week 4 Trace/Metrics Mandate)
management:
  endpoints:
    web:
      exposure:
        include: "health,info,metrics,prometheus" 
  endpoint:
    health:
      show-details: always
    info:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  #DISTRIBUTED TRACING (100% Trace Sampling for production observability)
  tracing:
    sampling:
      probability: 1.0

#STRUCTURED LOGGING & TRACING
logging:
  pattern:
    level: '{ "traceId": "%X{traceId:-}", "spanId": "%X{spanId:-}" } %5p [%t] %c{1}: %m%n'
  level:
    com.shopscale.order: INFO

#SERVICE DISCOVERY
eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:discovery-service}:8761/eureka/
  instance:
    prefer-ip-address: true
