services:
  # ---------------- INFRASTRUCTURE ----------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      KAFKA_OPTS: "-Dzookeeper.4lw.commands.whitelist=ruok,stat,srvr"
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep -q imok"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list > /dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 30s

  mongodb:
    image: mongo:7
    ports:
      - "127.0.0.1:${MONGO_HOST_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-shopscale}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shopscale-dev-password}
      POSTGRES_DB: ${POSTGRES_DB:-orderdb}
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-shopscale} -d ${POSTGRES_DB:-orderdb}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "127.0.0.1:${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  zipkin:
    image: openzipkin/zipkin:3
    ports:
      - "9411:9411"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9411/health | grep -q UP"]
      interval: 15s
      timeout: 10s
      retries: 15

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: start-dev --import-realm --health-enabled=true
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-shopscale-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-shopscale-admin-password}
      JAVA_OPTS_KC_HEAP: "-Xms256m -Xmx512m"
    ports:
      - "8180:8080"
    volumes:
      - ./keycloak/shopscale-realm.json:/opt/keycloak/data/import/shopscale-realm.json
    healthcheck:
      test: ["CMD-SHELL", "/opt/keycloak/bin/kcadm.sh config credentials --server http://localhost:8080 --realm master --user ${KEYCLOAK_ADMIN:-shopscale-admin} --password ${KEYCLOAK_ADMIN_PASSWORD:-shopscale-admin-password} > /dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 20
      start_period: 60s

  mailhog:
    image: mailhog/mailhog:v1.0.1
    platform: linux/amd64
    ports:
      - "1025:1025"
      - "8025:8025"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8025/api/v2/messages > /dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ---------------- PLATFORM ----------------
  config-server:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: config-server
    ports:
      - "8888:8888"
    volumes:
      - ./config-repo:/config-repo
    environment:
      SERVER_PORT: 8888
      JAVA_TOOL_OPTIONS: -Xms48m -Xmx96m -XX:+UseSerialGC
      CONFIG_REPO_PATH: file:/config-repo
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8888/actuator/health > /dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 40s

  discovery-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: discovery-service
    ports:
      - "8761:8761"
    depends_on:
      config-server:
        condition: service_healthy
    environment:
      SERVER_PORT: 8761
      JAVA_TOOL_OPTIONS: -Xms48m -Xmx96m -XX:+UseSerialGC
      EUREKA_HOST: discovery-service
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      CONFIG_SERVER_HOST: config-server
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8761/actuator/health > /dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 45s

  # ---------------- BUSINESS SERVICES ----------------
  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: api-gateway
    ports:
      - "9080:8080"
    restart: unless-stopped
    depends_on:
      config-server:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      zipkin:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      JAVA_TOOL_OPTIONS: -Xms48m -Xmx96m -XX:+UseSerialGC
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      CONFIG_SERVER_HOST: config-server
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KEYCLOAK_HOST: keycloak
      KEYCLOAK_PORT: 8080
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://zipkin:9411/api/v2/spans
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health > /dev/null || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 120s

  product-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: product-service
    ports:
      - "9081:8081"
    restart: unless-stopped
    depends_on:
      config-server:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      zipkin:
        condition: service_healthy
    environment:
      SERVER_PORT: 8081
      JAVA_TOOL_OPTIONS: -Xms48m -Xmx96m -XX:+UseSerialGC
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      CONFIG_SERVER_HOST: config-server
      KEYCLOAK_HOST: keycloak
      KEYCLOAK_PORT: 8080
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/productdb
      MONGODB_URI: mongodb://mongodb:27017/productdb
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://zipkin:9411/api/v2/spans
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/actuator/health > /dev/null || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 120s

  order-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: order-service
    ports:
      - "9082:8082"
    restart: unless-stopped
    depends_on:
      config-server:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      zipkin:
        condition: service_healthy
    environment:
      SERVER_PORT: 8082
      JAVA_TOOL_OPTIONS: -Xms128m -Xmx384m -XX:+UseG1GC
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      CONFIG_SERVER_HOST: config-server
      DB_HOST: postgres
      DB_NAME: orderdb
      DB_USER: ${POSTGRES_USER:-shopscale}
      DB_PASS: ${POSTGRES_PASSWORD:-shopscale-dev-password}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KEYCLOAK_HOST: keycloak
      KEYCLOAK_PORT: 8080
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://zipkin:9411/api/v2/spans
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8082/actuator/health > /dev/null || exit 1"]
      interval: 45s
      timeout: 30s
      retries: 40
      start_period: 180s

  inventory-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: inventory-service
    ports:
      - "9083:8083"
    restart: unless-stopped
    depends_on:
      config-server:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      zipkin:
        condition: service_healthy
    environment:
      SERVER_PORT: 8083
      JAVA_TOOL_OPTIONS: -Xms128m -Xmx384m -XX:+UseG1GC
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      CONFIG_SERVER_HOST: config-server
      DB_HOST: postgres
      DB_NAME: inventorydb
      DB_USER: ${POSTGRES_USER:-shopscale}
      DB_PASS: ${POSTGRES_PASSWORD:-shopscale-dev-password}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KEYCLOAK_HOST: keycloak
      KEYCLOAK_PORT: 8080
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://zipkin:9411/api/v2/spans
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8083/actuator/health > /dev/null || exit 1"]
      interval: 45s
      timeout: 30s
      retries: 40
      start_period: 180s

  notification-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: notification-service
    ports:
      - "9084:8084"
    restart: unless-stopped
    depends_on:
      config-server:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      mailhog:
        condition: service_healthy
      zipkin:
        condition: service_healthy
    environment:
      SERVER_PORT: 8084
      JAVA_TOOL_OPTIONS: -Xms128m -Xmx384m -XX:+UseG1GC
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      CONFIG_SERVER_HOST: config-server
      DB_HOST: postgres
      DB_NAME: notificationdb
      DB_USER: ${POSTGRES_USER:-shopscale}
      DB_PASS: ${POSTGRES_PASSWORD:-shopscale-dev-password}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KEYCLOAK_HOST: keycloak
      KEYCLOAK_PORT: 8080
      MAIL_HOST: mailhog
      MAIL_PORT: 1025
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://zipkin:9411/api/v2/spans
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8084/actuator/health > /dev/null || exit 1"]
      interval: 45s
      timeout: 30s
      retries: 40
      start_period: 180s

  price-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: price-service
    ports:
      - "9085:8085"
    restart: unless-stopped
    depends_on:
      config-server:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      zipkin:
        condition: service_healthy
    environment:
      SERVER_PORT: 8085
      JAVA_TOOL_OPTIONS: -Xms48m -Xmx96m -XX:+UseSerialGC
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      CONFIG_SERVER_HOST: config-server
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KEYCLOAK_HOST: keycloak
      KEYCLOAK_PORT: 8080
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://zipkin:9411/api/v2/spans
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8085/actuator/health > /dev/null || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 120s

  cart-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: cart-service
    ports:
      - "9086:8086"
    restart: unless-stopped
    depends_on:
      config-server:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
      price-service:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      zipkin:
        condition: service_healthy
    environment:
      SERVER_PORT: 8086
      JAVA_TOOL_OPTIONS: -Xms48m -Xmx96m -XX:+UseSerialGC
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      CONFIG_SERVER_HOST: config-server
      EUREKA_HOST: discovery-service
      KEYCLOAK_HOST: keycloak
      KEYCLOAK_PORT: 8080
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://zipkin:9411/api/v2/spans
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8086/actuator/health > /dev/null || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 120s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    restart: unless-stopped
    depends_on:
      api-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:80/ || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 20s

volumes:
  postgres_data:
  mongo_data:
  redis_data: