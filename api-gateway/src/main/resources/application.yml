server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: api-gateway

  config:
    import: optional:configserver:http://${CONFIG_SERVER_HOST:config-server}:8888

  threads:
    virtual:
      enabled: true

  cloud:
    gateway:
      discovery:
        locator:
          enabled: false

      httpclient:
        connect-timeout: 5000
        response-timeout: 5000

      default-filters:
        - TokenRelay

      routes:

        # BFF: browser hits /auth/** on the gateway; StripPrefix=1 forwards
        # /realms/... to Keycloak. This is the ONLY route that strips the
        # prefix — downstream service controllers are mapped at /api/** and
        # must receive the full path unchanged.
        - id: keycloak-bff
          uri: http://${KEYCLOAK_HOST:keycloak}:${KEYCLOAK_PORT:8080}
          predicates:
            - Path=/auth/**
          filters:
            - StripPrefix=1

        - id: product-service
          uri: http://product-service:8081
          predicates:
            - Path=/api/products
            - Path=/api/products/**
          filters:
            - name: CircuitBreaker
              args:
                name: productService
                fallbackUri: forward:/fallback/products

        - id: order-service
          uri: http://order-service:8082
          predicates:
            - Path=/api/orders
            - Path=/api/orders/**
          filters:
            - name: CircuitBreaker
              args:
                name: orderService
                fallbackUri: forward:/fallback/orders

        - id: inventory-service
          uri: http://inventory-service:8083
          predicates:
            - Path=/api/inventory
            - Path=/api/inventory/**
          filters:
            - name: CircuitBreaker
              args:
                name: inventoryService
                fallbackUri: forward:/fallback/inventory

        - id: cart-service
          uri: http://cart-service:8086
          predicates:
            - Path=/api/cart
            - Path=/api/cart/**
          filters:
            - RewritePath=/api/cart(?<remaining>/?.*), /api/v1/cart${remaining}
            - name: CircuitBreaker
              args:
                name: cartService
                fallbackUri: forward:/fallback/cart

        - id: price-service
          uri: http://price-service:8085
          predicates:
            - Path=/api/prices
            - Path=/api/prices/**
          filters:
            - RewritePath=/api/prices(?<remaining>/?.*), /api/v1/prices${remaining}
            - name: CircuitBreaker
              args:
                name: priceService
                fallbackUri: forward:/fallback/prices

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://${KEYCLOAK_HOST:keycloak}:${KEYCLOAK_PORT:8080}/realms/shopscale

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}

  session:
    store-type: redis

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:discovery-service}:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

  tracing:
    sampling:
      probability: 1.0

  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans

logging:
  pattern:
    level: "%5p [${spring.application.name},%X{traceId:-},%X{spanId:-}]"
  level:
    org.springframework.cloud.gateway: INFO

resilience4j:
  timelimiter:
    instances:
      productService:
        timeout-duration: 6s
      orderService:
        timeout-duration: 6s
      inventoryService:
        timeout-duration: 6s
      cartService:
        timeout-duration: 6s
      priceService:
        timeout-duration: 6s

app:
  security:
    cors:
      allowed-origin-patterns: ${ALLOWED_ORIGIN_PATTERNS:http://localhost:3000}