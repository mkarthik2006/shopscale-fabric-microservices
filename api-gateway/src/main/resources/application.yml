server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: api-gateway

  # Centralized configuration import
  config:
    import: optional:configserver:http://${CONFIG_SERVER_HOST:localhost}:8888

  # JAVA 21 VIRTUAL THREADS
  threads:
    virtual:
      enabled: true

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true

      # Default timeout for all routes (Resilience Mandate)
      httpclient:
        connect-timeout: 3000
        response-timeout: 5000

      routes:
        - id: product-service
          uri: lb://product-service
          predicates:
            - Path=/api/products/**
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@userOrIpKeyResolver}"
                redis-rate-limiter.replenishRate: 100
                redis-rate-limiter.burstCapacity: 100
            - name: CircuitBreaker
              args:
                name: productService
                fallbackUri: forward:/fallback/products
            - TokenRelay

        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/orders/**
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@userOrIpKeyResolver}"
                redis-rate-limiter.replenishRate: 100
                redis-rate-limiter.burstCapacity: 100
            - name: CircuitBreaker
              args:
                name: orderService
                fallbackUri: forward:/fallback/orders
            - TokenRelay

        - id: inventory-service
          uri: lb://inventory-service
          predicates:
            - Path=/api/inventory/**
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@userOrIpKeyResolver}"
                redis-rate-limiter.replenishRate: 100
                redis-rate-limiter.burstCapacity: 100
            - name: CircuitBreaker
              args:
                name: inventoryService
                fallbackUri: forward:/fallback/inventory
            - TokenRelay

        - id: cart-service
          uri: lb://cart-service
          predicates:
            - Path=/api/cart/**
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@userOrIpKeyResolver}"
                redis-rate-limiter.replenishRate: 100
                redis-rate-limiter.burstCapacity: 100
            - name: CircuitBreaker
              args:
                name: cartService
                fallbackUri: forward:/fallback/cart
            - TokenRelay

        - id: price-service
          uri: lb://price-service
          predicates:
            - Path=/api/prices/**
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@userOrIpKeyResolver}"
                redis-rate-limiter.replenishRate: 100
                redis-rate-limiter.burstCapacity: 100
            - name: CircuitBreaker
              args:
                name: priceService
                fallbackUri: forward:/fallback/prices
            - TokenRelay

  security:
    oauth2:
      resourceserver:
        jwt:
          # Port externalized — local=8180 (host), Docker=8080 (internal)
          issuer-uri: http://${KEYCLOAK_HOST:localhost}:${KEYCLOAK_PORT:8180}/realms/shopscale

  # Spring Boot 3.x uses spring.data.redis prefix
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:8761/eureka/

# OBSERVABILITY & TRACING
management:
  endpoints:
    web:
      exposure:
        include: "health,info,metrics,prometheus"
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: 1.0
  metrics:
    tags:
      application: ${spring.application.name}

# STRUCTURED LOGGING
logging:
  pattern:
    level: "%5p [${spring.application.name},%X{traceId:-},%X{spanId:-}]"
  level:
    org.springframework.cloud.gateway: INFO