server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: api-gateway

  config:
    import: optional:configserver:http://${CONFIG_SERVER_HOST:config-server}:8888

  threads:
    virtual:
      enabled: true

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true

      httpclient:
        connect-timeout: 5000
        response-timeout: 5000

      default-filters:
        - TokenRelay
        - RemoveRequestHeader=Cookie

      routes:

        - id: keycloak-bff
          uri: http://${KEYCLOAK_HOST:keycloak}:${KEYCLOAK_PORT:8080}
          predicates:
            - Path=/auth/**
          filters:
            - StripPrefix=1

        - id: product-service
          uri: lb://product-service
          predicates:
            - Path=/api/products/**
          filters:
            - StripPrefix=1
            - name: CircuitBreaker
              args:
                name: productService
                fallbackUri: forward:/fallback/products
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@userOrIpKeyResolver}"
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20

        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/orders/**
          filters:
            - StripPrefix=1
            - name: CircuitBreaker
              args:
                name: orderService
                fallbackUri: forward:/fallback/orders

        - id: inventory-service
          uri: lb://inventory-service
          predicates:
            - Path=/api/inventory/**
          filters:
            - StripPrefix=1
            - name: CircuitBreaker
              args:
                name: inventoryService
                fallbackUri: forward:/fallback/inventory

        - id: cart-service
          uri: lb://cart-service
          predicates:
            - Path=/api/cart/**
          filters:
            - StripPrefix=1
            - name: CircuitBreaker
              args:
                name: cartService
                fallbackUri: forward:/fallback/cart

        - id: price-service
          uri: lb://price-service
          predicates:
            - Path=/api/prices/**
          filters:
            - StripPrefix=1
            - name: CircuitBreaker
              args:
                name: priceService
                fallbackUri: forward:/fallback/prices

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://${KEYCLOAK_HOST:keycloak}:${KEYCLOAK_PORT:8080}/realms/shopscale

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}

  session:
    store-type: redis

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:discovery-service}:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

  tracing:
    sampling:
      probability: 1.0

  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans

logging:
  pattern:
    level: "%5p [${spring.application.name},%X{traceId:-},%X{spanId:-}]"
  level:
    org.springframework.cloud.gateway: INFO

app:
  security:
    cors:
      allowed-origin-patterns: ${ALLOWED_ORIGIN_PATTERNS:http://localhost:3000}