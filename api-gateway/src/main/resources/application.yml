server:
  port: 8080

spring:
  application:
    name: api-gateway
  
  # Centralized configuration import
  config:
    import: optional:configserver:http://${CONFIG_SERVER_HOST:localhost}:8888

  #JAVA 21 VIRTUAL THREADS (Critical for handling thousands of requests/sec)
  threads:
    virtual:
      enabled: true

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
      
      # Default timeout for all routes (Resilience Mandate)
      httpclient:
        connect-timeout: 2000
        response-timeout: 3000

      routes:
        - id: product-service
          uri: lb://product-service
          predicates:
            - Path=/api/products/**
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@userOrIpKeyResolver}"
                # MATCHING PLAN: 100 requests per minute (~1.6 req/sec)
                redis-rate-limiter.replenishRate: 2
                redis-rate-limiter.burstCapacity: 20
            - name: CircuitBreaker # Resilience4j (Week 4 Mandate)
              args:
                name: productService
                fallbackUri: forward:/fallback/products

        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/orders/**
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@userOrIpKeyResolver}"
                redis-rate-limiter.replenishRate: 2
                redis-rate-limiter.burstCapacity: 20
            - name: CircuitBreaker
              args:
                name: orderService
                fallbackUri: forward:/fallback/orders

        - id: inventory-service
          uri: lb://inventory-service
          predicates:
            - Path=/api/inventory/**
          filters:
            - name: CircuitBreaker
              args:
                name: inventoryService

        # Placeholder routes for pending services
        - id: cart-service
          uri: lb://cart-service
          predicates:
            - Path=/api/cart/**
        
        - id: price-service
          uri: lb://price-service
          predicates:
            - Path=/api/prices/**

  security:
    oauth2:
      resourceserver:
        jwt:
          #PORT RESOLVED: Changed port to 8180 to avoid collision with Gateway on 8080
          issuer-uri: http://${KEYCLOAK_HOST:localhost}:8180/realms/shopscale

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:8761/eureka/

#OBSERVABILITY & TRACING (Week 4 Mandate)
management:
  endpoints:
    web:
      exposure:
        include: "health,info,metrics,prometheus" 
  tracing:
    sampling:
      probability: 1.0 # 100% Trace sampling for development
  metrics:
    tags:
      application: ${spring.application.name}

#STRUCTURED LOGGING
logging:
  pattern:
    level: "%5p [${spring.application.name},%X{traceId:-},%X{spanId:-}]"
  level:
    # gateway: DEBUG # Enable for deep routing debug
    org.springframework.cloud.gateway: INFO
