server:
  port: ${SERVER_PORT:8084}

spring:
  application:
    name: notification-service

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://${KEYCLOAK_HOST:keycloak}:${KEYCLOAK_PORT:8080}/realms/shopscale

  config:
    import: optional:configserver:http://${CONFIG_SERVER_HOST:config-server}:8888
    fail-fast: true
    retry:
      max-attempts: 10

  threads:
    virtual:
      enabled: true

  # ✅ REDIS (Redisson for caching + idempotency)
  redis:
    redisson:
      config: |
        singleServerConfig:
          address: "redis://${REDIS_HOST:redis}:${REDIS_PORT:6379}"

  # ✅ DATABASE (Idempotency Store)
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:5432/${DB_NAME:notificationdb}
    username: ${DB_USER:shopscale}
    password: ${DB_PASS:shopscale}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 25
        cache:
          use_second_level_cache: true
          use_query_cache: false
          region:
            factory_class: org.redisson.hibernate.RedissonRegionFactory

  # ✅ KAFKA
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}

    consumer:
      group-id: notification-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.shopscale.common.events,java.lang,java.util"
        spring.json.use.type.headers: true

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

    listener:
      concurrency: 3
      ack-mode: record

  # ✅ EMAIL (MailHog)
  mail:
    host: ${MAIL_HOST:mailhog}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false

# ✅ APP CONFIG
app:
  kafka:
    topic:
      order-placed: order.placed
      order-cancelled: order.cancelled
    dlq:
      max-retries: 3
      retry-interval-ms: 1000

  notification:
    from: noreply@shopscale.dev
    default-recipient: customer@example.com

# ✅ OBSERVABILITY
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

  endpoint:
    health:
      probes:
        enabled: true
      show-details: always

  tracing:
    sampling:
      probability: 1.0

  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans

  metrics:
    tags:
      application: ${spring.application.name}

# ✅ LOGGING
logging:
  pattern:
    level: "%5p [${spring.application.name},%X{traceId:-},%X{spanId:-}]"

# ✅ SERVICE DISCOVERY
eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:discovery-service}:8761/eureka/

  instance:
    prefer-ip-address: true