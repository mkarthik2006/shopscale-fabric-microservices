server:
  port: 8085

spring:
  application:
    name: price-service

  config:
    import: optional:configserver:http://${CONFIG_SERVER_HOST:localhost}:8888
    fail-fast: true
    retry:
      max-attempts: 10

  threads:
    virtual:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: "health,info,metrics,prometheus" 
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
  # ⚡ FIX: Add 100% trace sampling (was missing — defaulted to 10%)
  tracing:
    sampling:
      probability: 1.0

logging:
  pattern:
    level: "%5p [${spring.application.name},%X{traceId:-},%X{spanId:-}]"

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:8761/eureka/