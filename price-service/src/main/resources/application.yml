server:
  port: ${SERVER_PORT:8085}

spring:
  application:
    name: price-service

  config:
    import: optional:configserver:http://${CONFIG_SERVER_HOST:localhost}:8888
    fail-fast: true
    retry:
      max-attempts: 10

  threads:
    virtual:
      enabled: true

  # CLEAN CODE: Redis connection externalized via env vars
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

management:
  endpoints:
    web:
      exposure:
        include: "health,info,metrics,prometheus" 
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0

logging:
  pattern:
    level: "%5p [${spring.application.name},%X{traceId:-},%X{spanId:-}]"

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:8761/eureka/