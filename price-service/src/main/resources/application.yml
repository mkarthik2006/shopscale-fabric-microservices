server:
  port: 8085

spring:
  application:
    name: price-service

  # Centralized configuration import (Enterprise Mandate)
  config:
    import: optional:configserver:http://${CONFIG_SERVER_HOST:localhost}:8888
    fail-fast: true
    retry:
      max-attempts: 10

  # JAVA 21 VIRTUAL THREADS (Critical for high-throughput microservices)
  threads:
    virtual:
      enabled: true

# OBSERVABILITY & HEALTH (Week 4 Mandate / Checklist: Actuator)
management:
  endpoints:
    web:
      exposure:
        include: "health,info,metrics,prometheus" 
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

# STRUCTURED LOGGING (Checklist: Distributed Tracing Correlation)
logging:
  pattern:
    level: "%5p [${spring.application.name},%X{traceId:-},%X{spanId:-}]"

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:8761/eureka/
