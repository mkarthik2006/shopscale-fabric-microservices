server:
  port: 8083

spring:
  application:
    name: inventory-service

  # Centralized configuration import (Enterprise Mandate)
  config:
    import: optional:configserver:http://${CONFIG_SERVER_HOST:localhost}:8888
    fail-fast: true
    retry:
      max-attempts: 10

  #JAVA 21 VIRTUAL THREADS (Critical for inventory operations)
  threads:
    virtual:
      enabled: true

  #DATABASE (PostgreSQL - Mandatory Page 6)
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:inventorydb}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  #KAFKA (Event-Driven Role)
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

    consumer:
      group-id: inventory-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.value.default.type: com.shopscale.common.events.OrderPlacedEvent
        spring.json.trusted.packages: "*"

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      #ENTERPRISE HARDENING
      acks: all 
      retries: 5
      properties:
        enable.idempotence: true # Essential for SAGA consistency

#OBSERVABILITY & HEALTH (Week 4 Mandate)
management:
  endpoints:
    web:
      exposure:
        include: "health,info,metrics,prometheus" 
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

#STRUCTURED LOGGING
logging:
  pattern:
    level: "%5p [${spring.application.name},%X{traceId:-},%X{spanId:-}]"

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:8761/eureka/
