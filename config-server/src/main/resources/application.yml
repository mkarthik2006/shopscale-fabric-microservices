server:
  port: ${SERVER_PORT:8888}

spring:
  application:
    name: config-server

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:native}

  cloud:
    config:
      server:
        native:
          search-locations: ${CONFIG_REPO_PATH:file:/config-repo}

  # JAVA 21 VIRTUAL THREADS
  threads:
    virtual:
      enabled: true

# OBSERVABILITY
management:
  endpoints:
    web:
      exposure:
        include: "health,info,metrics,prometheus"
  endpoint:
    health:
      show-details: always
    info:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

# SERVICE DISCOVERY (PROJECT_RULES.md Week 1 — all services register with Eureka)
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

# LOGGING
logging:
  level:
    com.shopscale.config: INFO
  pattern:
    level: "%5p [${spring.application.name},%X{traceId:-},%X{spanId:-}]"